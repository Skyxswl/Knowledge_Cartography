services:
  - type: web
    name: zoommind
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: ZOOMMIND_LLM_PROVIDER
        value: openai-compatible
      - key: ZOOMMIND_LLM_API_KEY
        sync: false
      - key: ZOOMMIND_LLM_BASE_URL
        value: https://api.minimaxi.com/v1
      - key: ZOOMMIND_LLM_MODEL
        value: MiniMax-M2
      - key: ZOOMMIND_LLM_TIMEOUT_SECONDS
        value: "60"
      - key: ZOOMMIND_LLM_TEMPERATURE
        value: "1.0"
      - key: ZOOMMIND_LLM_MAX_TOKENS
        value: "700"
      - key: ZOOMMIND_LLM_REASONING_SPLIT
        value: "true"
